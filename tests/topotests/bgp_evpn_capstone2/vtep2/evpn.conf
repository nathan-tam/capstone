!
frr defaults datacenter
!
! debug bgp evpn mh es
! debug bgp evpn mh route
! debug bgp zebra
debug bgp updates
!
!
router bgp 65002
  bgp router-id 20.20.20.20
  no bgp ebgp-requires-policy

  neighbor TRANSIT_OVERLAY peer-group
  neighbor TRANSIT_OVERLAY remote-as external

  neighbor 10.1.2.1 peer-group TRANSIT_OVERLAY
  neighbor 10.2.2.1 peer-group TRANSIT_OVERLAY

  address-family ipv4 unicast
    neighbor TRANSIT_OVERLAY activate
    redistribute connected
  exit-address-family

  address-family l2vpn evpn
    neighbor TRANSIT_OVERLAY activate
    advertise-all-vni
!    advertise-mac-only
    advertise-svi-ip
  exit-address-family
!

!router bgp 65002 vrf vrf500
!  address-family ipv4 unicast
!  redistribute connected
!  exit-address-family
!  !
!  address-family ipv6 unicast
!  redistribute connected
!  exit-address-family
!
!  address-family l2vpn evpn
!    advertise ipv4 unicast
!    advertise ipv6 unicast
!  exit-address-family
!
exit
