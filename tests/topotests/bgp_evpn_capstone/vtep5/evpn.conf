!
frr defaults datacenter
!
! debug bgp evpn mh es
! debug bgp evpn mh route
! debug bgp zebra
!
!
router bgp 65023
  bgp router-id 192.168.100.19
  no bgp ebgp-requires-policy

  neighbor TRANSIT_OVERLAY peer-group
  neighbor TRANSIT_OVERLAY remote-as external

  neighbor 192.168.9.1 peer-group TRANSIT_OVERLAY
  neighbor 192.168.10.1 peer-group TRANSIT_OVERLAY

  address-family ipv4 unicast
    neighbor TRANSIT_OVERLAY activate
    redistribute connected
  exit-address-family
  address-family l2vpn evpn
    neighbor TRANSIT_OVERLAY activate
    advertise-all-vni
    advertise-svi-ip
  exit-address-family
exit
