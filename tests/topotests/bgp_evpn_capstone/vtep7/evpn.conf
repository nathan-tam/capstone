!
frr defaults datacenter
!
! debug bgp evpn mh es
! debug bgp evpn mh route
! debug bgp zebra
!
!
router bgp 65025
  bgp router-id 192.168.100.21
  no bgp ebgp-requires-policy

  neighbor TRANSIT_OVERLAY peer-group
  neighbor TRANSIT_OVERLAY remote-as external

  neighbor 192.168.13.1 peer-group TRANSIT_OVERLAY
  neighbor 192.168.14.1 peer-group TRANSIT_OVERLAY

  address-family ipv4 unicast
    neighbor TRANSIT_OVERLAY activate
    redistribute connected
  exit-address-family
  address-family l2vpn evpn
    neighbor TRANSIT_OVERLAY activate
    advertise-all-vni
    advertise-svi-ip
    vni 1000
      rd 192.168.100.21:1000
      route-target import 65000:1000
      route-target export 65000:1000
    exit-vni
  exit-address-family
exit
