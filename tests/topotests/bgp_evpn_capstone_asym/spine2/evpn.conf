frr defaults datacenter
!
router bgp 65001
  bgp router-id 192.168.100.14
  no bgp ebgp-requires-policy

  neighbor TRANSIT_OVERLAY peer-group
  neighbor TRANSIT_OVERLAY remote-as external

  neighbor 192.168.5.2 peer-group TRANSIT_OVERLAY
  neighbor 192.168.6.2 peer-group TRANSIT_OVERLAY
  neighbor 192.168.7.2 peer-group TRANSIT_OVERLAY
  neighbor 192.168.8.2 peer-group TRANSIT_OVERLAY
  neighbor 192.168.10.2 peer-group TRANSIT_OVERLAY
  neighbor 192.168.12.2 peer-group TRANSIT_OVERLAY
  neighbor 192.168.14.2 peer-group TRANSIT_OVERLAY
  redistribute connected
  address-family l2vpn evpn
    neighbor TRANSIT_OVERLAY activate
    neighbor 192.168.5.2 route-map EVPN-TO-HUB out
    neighbor 192.168.6.2 route-map EVPN-TO-SPOKE out
    neighbor 192.168.7.2 route-map EVPN-TO-SPOKE out
    neighbor 192.168.8.2 route-map EVPN-TO-SPOKE out
    neighbor 192.168.10.2 route-map EVPN-TO-SPOKE out
    neighbor 192.168.12.2 route-map EVPN-TO-SPOKE out
    neighbor 192.168.14.2 route-map EVPN-TO-SPOKE out
  exit-address-family
!

bgp extcommunity-list standard EVPN-HUB-RT permit rt 65000:1000
bgp extcommunity-list standard EVPN-SPOKE-RTS permit rt 65000:1002 rt 65000:1003 rt 65000:1004 rt 65000:1005 rt 65000:1006 rt 65000:1007

route-map EVPN-TO-HUB permit 10
 match extcommunity EVPN-SPOKE-RTS any
route-map EVPN-TO-HUB deny 20
!
route-map EVPN-TO-SPOKE permit 10
 match extcommunity EVPN-HUB-RT any
route-map EVPN-TO-SPOKE deny 20
!
