!
frr defaults datacenter
!
!
router bgp 65011
  bgp router-id 192.168.100.15
  no bgp ebgp-requires-policy

  neighbor TRANSIT_OVERLAY peer-group
  neighbor TRANSIT_OVERLAY remote-as external

  neighbor 192.168.1.1 peer-group TRANSIT_OVERLAY
  neighbor 192.168.5.1 peer-group TRANSIT_OVERLAY

  address-family ipv4 unicast
    neighbor TRANSIT_OVERLAY activate
    redistribute connected
  exit-address-family

  address-family l2vpn evpn
    neighbor TRANSIT_OVERLAY activate
    advertise-all-vni
    advertise-svi-ip
    vni 1000
      rd 192.168.100.15:1000
      route-target import 65000:1000
      route-target import 65000:1002
      route-target import 65000:1003
      route-target import 65000:1004
      route-target import 65000:1005
      route-target import 65000:1006
      route-target import 65000:1007
      route-target export 65000:1000
    exit-vni
  exit-address-family