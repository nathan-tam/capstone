router bgp 65011
  bgp router-id 192.168.100.15
  no bgp ebgp-requires-policy

  neighbor TRANSIT_OVERLAY peer-group
  neighbor TRANSIT_OVERLAY remote-as external
  
  ! 1. FIX: Enable Extended Communities (Required for Route Targets)
  neighbor TRANSIT_OVERLAY send-community extended

  neighbor 192.168.1.1 peer-group TRANSIT_OVERLAY
  neighbor 192.168.5.1 peer-group TRANSIT_OVERLAY

  address-family ipv4 unicast
    neighbor TRANSIT_OVERLAY activate
    redistribute connected
  exit-address-family

  address-family l2vpn evpn
    ! 2. FIX: Activate the neighbor (Required to exchange EVPN routes)
    neighbor TRANSIT_OVERLAY activate
    
    ! 3. FIX: Remove this. It forces "Auto-Config" and overrides your manual RTs.
    no advertise-all-vni
    
    ! Advertise SVI IP (Type-2 routes)
    advertise-svi-ip
    
    ! Manual VNI Block (Now this will actually be used)
    vni 1000
      rd 192.168.100.15:1000
      
      ! Import the Controller (Self) and all Spokes
      route-target import 65000:1000
      route-target import 65000:1002
      route-target import 65000:1003
      route-target import 65000:1004
      route-target import 65000:1005
      route-target import 65000:1006
      route-target import 65000:1007
      
      ! Export as Controller
      route-target export 65000:1000
    exit-vni
  exit-address-family