<!DOCTYPE html>
<html>
<head>
    <title>EVPN Mobility Visualizer</title>

    <!-- load Socket.IO client so this page can receive real-time events from Flask-SocketIO -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>

    <!-- load vis-network library used to draw and update the topology graph -->
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>

    <!-- page styling -->
    <style>
        /* fill viewport, remove default spacing, and use a dark background for contrast. */
        body { margin: 0; padding: 0; background-color: #121212; color: white; font-family: sans-serif; }

        /* main network canvas takes the entire browser window. */
        #mynetwork { width: 100vw; height: 100vh; }

        /* floating info card in the top-left corner that stays above the network canvas. */
        #overlay { position: absolute; top: 10px; left: 10px; z-index: 10; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px; border: 1px solid #333;}
    </style>
</head>
<body>
    <!-- legend overlay for color/type mapping for nodes -->
    <div id="overlay">
        <!-- heading for legend section. -->
        <h3 style="margin-top: 0;">EVPN Topology</h3>

        <!-- quick visual key for graph node categories. -->
        <p>🔴 Spine <br>🔵 VTEP <br>🟢 Host <br>🟡 VM (Mobile)</p>
    </div>

    <!-- container element where vis-network renders the topology graph -->
    <div id="mynetwork"></div>

    <!-- client-side logic for creating graph objects and processing live events -->
    <script>
        var nodes = new vis.DataSet([]);
        var edges = new vis.DataSet([]);
        var container = document.getElementById('mynetwork');

        var data = { nodes: nodes, edges: edges };

        // 1. Enable Hierarchical Layout and tune the physics
        var options = {
            layout: {
                hierarchical: {
                    enabled: true,
                    direction: 'UD',          // Up-Down pyramid
                    sortMethod: 'directed',   // Respect the levels we assign
                    nodeSpacing: 150,         // Horizontal space between nodes
                    levelSeparation: 150      // Vertical space between layers
                }
            },
            physics: {
                solver: 'hierarchicalRepulsion',
                hierarchicalRepulsion: {
                    nodeDistance: 150,
                    springConstant: 0.05,
                    damping: 0.09
                }
            },
            nodes: { shape: 'dot', font: { color: '#ffffff' }, borderWidth: 2 },
            // Use curved vertical lines for a cleaner diagram look
            edges: { width: 2, smooth: { type: 'cubicBezier', forceDirection: 'vertical', roundness: 0.4 } }
        };
        var network = new vis.Network(container, data, options);

        var socket = io.connect('http://' + document.domain + ':' + location.port);

        socket.on('network_event', function(msg) {
            if (msg.action === 'ADD_NODE') {
                if (!nodes.get(msg.id)) {
                    let color, size, level;
                    
                    // 2. Explicitly assign levels to enforce the hierarchy
                    if (msg.type === 'spine') { 
                        color = '#ff4d4d'; size = 25; level = 0; 
                    } else if (msg.type === 'vtep') { 
                        color = '#4da6ff'; size = 25; level = 1; 
                    } else if (msg.type === 'host') { 
                        color = '#4dff4d'; size = 25; level = 2; 
                    } else { 
                        color = '#ffff4d'; size = 12; level = 3; // VM
                    }
                    
                    nodes.add({
                        id: msg.id, 
                        label: msg.id, 
                        color: {background: color, border: '#ffffff'}, 
                        size: size,
                        level: level 
                    });
                }
            } 
            else if (msg.action === 'ADD_LINK') {
                let edgeId = msg.source + '-' + msg.target;
                if (!edges.get(edgeId)) {
                    let color = msg.source.startsWith('vm') ? '#ffff4d' : '#888888';
                    edges.add({id: edgeId, from: msg.source, to: msg.target, color: {color: color}});
                }
            }
            else if (msg.action === 'DEL_LINK') {
                let edgeId = msg.source + '-' + msg.target;
                if (edges.get(edgeId)) edges.remove(edgeId);
            }
        });
    </script>
</body>
</html>
