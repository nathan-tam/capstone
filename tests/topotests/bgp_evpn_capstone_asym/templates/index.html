<!DOCTYPE html>
<html>
<head>
    <title>EVPN Mobility Visualizer</title>

    <!-- load Socket.IO client so this page can receive real-time events from Flask-SocketIO -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>

    <!-- load vis-network library used to draw and update the topology graph -->
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>

    <!-- page styling -->
    <style>
        /* fill viewport, remove default spacing, and use a dark background for contrast. */
        body { margin: 0; padding: 0; background-color: #121212; color: white; font-family: sans-serif; }

        /* main network canvas takes the entire browser window. */
        #mynetwork { width: 100vw; height: 100vh; }

        /* floating info card in the top-left corner that stays above the network canvas. */
        #overlay { position: absolute; top: 10px; left: 10px; z-index: 10; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px; border: 1px solid #333;}
    </style>
</head>
<body>
    <!-- legend overlay for color/type mapping for nodes -->
    <div id="overlay">
        <!-- heading for legend section. -->
        <h3 style="margin-top: 0;">EVPN Topology</h3>

        <!-- quick visual key for graph node categories. -->
        <p>🔴 Spine <br>🔵 VTEP <br>🟢 Host <br>🟡 VM (Mobile)</p>
    </div>

    <!-- container element where vis-network renders the topology graph -->
    <div id="mynetwork"></div>

    <!-- client-side logic for creating graph objects and processing live events -->
    <script>
        // DataSet storing all topology nodes (spines, VTEPs, hosts, VMs).
        var nodes = new vis.DataSet([]);

        // DataSet storing links between devices (for example, host-to-vtep and vm-to-host).
        var edges = new vis.DataSet([]);

        // reference to the DOM element where the graph will be rendered.
        var container = document.getElementById('mynetwork');
        
        // vis-network expects a data object containing node and edge datasets.
        var data = { nodes: nodes, edges: edges };

        // graph behavior and styling options.
        var options = {
            // enable force-directed physics so nodes spread out naturally.
            physics: {
                // use ForceAtlas2-based solver for readable topology spacing.
                solver: 'forceAtlas2Based',

                // physics tuning values controlling attraction/repulsion and link stiffness.
                forceAtlas2Based: { gravitationalConstant: -100, centralGravity: 0.01, springLength: 200, springConstant: 0.08 }
            },

            // default node shape and text appearance.
            nodes: { shape: 'dot', font: { color: '#ffffff' }, borderWidth: 2 },

            // default edge thickness and smoothing.
            edges: { width: 2, smooth: { type: 'continuous' } }
        };

        // create the live network visualization instance.
        var network = new vis.Network(container, data, options);

        // connect to the same host/port serving this page using Socket.IO.
        var socket = io.connect('http://' + document.domain + ':' + location.port);

        // listen for backend-emitted topology events.
        socket.on('network_event', function(msg) {
            // handle node-addition events.
            if (msg.action === 'ADD_NODE') {
                // prevent duplicate nodes if the same event is sent more than once.
                if (!nodes.get(msg.id)) {
                    // choose node color based on topology role.
                    let color = msg.type === 'spine' ? '#ff4d4d' : 
                                msg.type === 'vtep' ? '#4da6ff' : 
                                msg.type === 'host' ? '#4dff4d' : '#ffff4d'; // VM

                    // make VM nodes smaller than infrastructure nodes for visual distinction.
                    let size = msg.type === 'vm' ? 12 : 25;

                    // add the node to the graph with label, color, and size.
                    nodes.add({id: msg.id, label: msg.id, color: {background: color, border: '#ffffff'}, size: size});
                }
            } 
            // handle link creation between two existing nodes.
            else if (msg.action === 'ADD_LINK') {
                // generate stable edge ID from source and target names.
                let edgeId = msg.source + '-' + msg.target;

                // prevent duplicate links on repeated events.
                if (!edges.get(edgeId)) {
                    // color VM attachment links yellow; other topology links gray.
                    let color = msg.source.startsWith('vm') ? '#ffff4d' : '#888888';

                    // add the edge connecting source and target nodes.
                    edges.add({id: edgeId, from: msg.source, to: msg.target, color: {color: color}});
                }
            }
            // handle link deletion when an endpoint is detached/moved.
            else if (msg.action === 'DEL_LINK') {
                // rebuild the same deterministic edge ID used for insertion.
                let edgeId = msg.source + '-' + msg.target;

                // remove the edge only if it currently exists.
                if (edges.get(edgeId)) edges.remove(edgeId);
            }
        });
    </script>
</body>
</html>
