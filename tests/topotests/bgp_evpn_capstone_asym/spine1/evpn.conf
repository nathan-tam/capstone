frr defaults datacenter
!
router bgp 65001
  bgp router-id 192.168.100.13
  no bgp ebgp-requires-policy
  
  ! Ensure Spine keeps routes even if it has no local VRF
  bgp retain-route-target all

  neighbor TRANSIT_OVERLAY peer-group
  neighbor TRANSIT_OVERLAY remote-as external
  
  ! Send Extended Communities (RTs) to neighbors
  neighbor TRANSIT_OVERLAY send-community extended

  neighbor 192.168.1.2 peer-group TRANSIT_OVERLAY
  neighbor 192.168.2.2 peer-group TRANSIT_OVERLAY
  neighbor 192.168.3.2 peer-group TRANSIT_OVERLAY
  neighbor 192.168.4.2 peer-group TRANSIT_OVERLAY
  neighbor 192.168.9.2 peer-group TRANSIT_OVERLAY
  neighbor 192.168.11.2 peer-group TRANSIT_OVERLAY
  neighbor 192.168.13.2 peer-group TRANSIT_OVERLAY

  redistribute connected

  address-family l2vpn evpn
    neighbor TRANSIT_OVERLAY activate
    
    ! Preserve the VTEP IPs
    neighbor TRANSIT_OVERLAY next-hop-unchanged
    
    ! Apply Maps
    neighbor 192.168.1.2 route-map EVPN-TO-HUB out
    neighbor 192.168.2.2 route-map EVPN-TO-SPOKE out
    neighbor 192.168.3.2 route-map EVPN-TO-SPOKE out
    neighbor 192.168.4.2 route-map EVPN-TO-SPOKE out
    neighbor 192.168.9.2 route-map EVPN-TO-SPOKE out
    neighbor 192.168.11.2 route-map EVPN-TO-SPOKE out
    neighbor 192.168.13.2 route-map EVPN-TO-SPOKE out
  exit-address-family
!

! --- DEFINITIONS ---

! Hub RT (What the Controller/Hub exports)
bgp extcommunity-list standard EVPN-HUB-RT permit rt 65000:1000

! --- ROUTE MAPS ---

! To hub: permit all EVPN routes (hub imports what it needs via RT)
route-map EVPN-TO-HUB permit 10
 ! No match clause = permit all

! To spokes: only permit routes tagged with the hub RT
route-map EVPN-TO-SPOKE permit 10
 match extcommunity EVPN-HUB-RT
route-map EVPN-TO-SPOKE deny 20



