frr defaults datacenter
!
router bgp 65001
  bgp router-id 192.168.100.13
  no bgp ebgp-requires-policy
  
  ! RECOMMENDED: Ensure Spine keeps routes even if it has no local VRF
  bgp retain-route-target all

  neighbor TRANSIT_OVERLAY peer-group
  neighbor TRANSIT_OVERLAY remote-as external
  
  ! CRITICAL: Force neighbors to send Extended Communities (RTs)
  neighbor TRANSIT_OVERLAY send-community extended

  neighbor 192.168.1.2 peer-group TRANSIT_OVERLAY
  neighbor 192.168.2.2 peer-group TRANSIT_OVERLAY
  neighbor 192.168.3.2 peer-group TRANSIT_OVERLAY
  neighbor 192.168.4.2 peer-group TRANSIT_OVERLAY
  neighbor 192.168.9.2 peer-group TRANSIT_OVERLAY
  neighbor 192.168.11.2 peer-group TRANSIT_OVERLAY
  neighbor 192.168.13.2 peer-group TRANSIT_OVERLAY

  redistribute connected

  address-family l2vpn evpn
    neighbor TRANSIT_OVERLAY activate
    
    ! CRITICAL FIX: Preserve the VTEP IPs
    neighbor TRANSIT_OVERLAY next-hop-unchanged
    
    ! Apply Maps
    neighbor 192.168.1.2 route-map EVPN-TO-HUB out
    neighbor 192.168.2.2 route-map EVPN-TO-SPOKE out
    neighbor 192.168.3.2 route-map EVPN-TO-SPOKE out
    neighbor 192.168.4.2 route-map EVPN-TO-SPOKE out
    neighbor 192.168.9.2 route-map EVPN-TO-SPOKE out
    neighbor 192.168.11.2 route-map EVPN-TO-SPOKE out
    neighbor 192.168.13.2 route-map EVPN-TO-SPOKE out
  exit-address-family
!

! --- DEFINITIONS ---

! Hub RT (What the Controller Exports)
bgp extcommunity-list standard EVPN-HUB-RT permit rt 65000:1000

! Spoke RTs (What the Spokes Export)
! OPTION A: Standard List (Safer one per line)
bgp extcommunity-list standard EVPN-SPOKE-RTS permit rt 65000:1002
bgp extcommunity-list standard EVPN-SPOKE-RTS permit rt 65000:1003
bgp extcommunity-list standard EVPN-SPOKE-RTS permit rt 65000:1004
bgp extcommunity-list standard EVPN-SPOKE-RTS permit rt 65000:1005
bgp extcommunity-list standard EVPN-SPOKE-RTS permit rt 65000:1006
bgp extcommunity-list standard EVPN-SPOKE-RTS permit rt 65000:1007
! OPTION B: Expanded Regex (Advanced, matches 1000-1099)
! bgp extcommunity-list expanded EVPN-SPOKE-RTS permit rt 65000:10[0-9][0-9]

! --- ROUTE MAPS ---

! 1. FILTER TO HUB (The Controller)
! Optimization: Just allow everything. The Hub needs to see all.
route-map EVPN-TO-HUB permit 10
 ! No match clause = Match All

! 2. FILTER TO SPOKES (The Clients)
! Strict: Only allow routes tagged with Hub-RT
route-map EVPN-TO-SPOKE permit 10
 match extcommunity EVPN-HUB-RT
! Explicit Deny (Good practice, though implicit exists)
route-map EVPN-TO-SPOKE deny 20