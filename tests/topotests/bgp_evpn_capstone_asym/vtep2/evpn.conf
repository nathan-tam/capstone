router bgp 65012
  bgp router-id 192.168.100.16
  no bgp ebgp-requires-policy

  neighbor TRANSIT_OVERLAY peer-group
  neighbor TRANSIT_OVERLAY remote-as external
  
  ! 1. Good: You have the critical extended community command here.
  neighbor TRANSIT_OVERLAY send-community extended

  neighbor 192.168.2.1 peer-group TRANSIT_OVERLAY
  neighbor 192.168.6.1 peer-group TRANSIT_OVERLAY

  address-family ipv4 unicast
    neighbor TRANSIT_OVERLAY activate
    redistribute connected
  exit-address-family

  address-family l2vpn evpn
    neighbor TRANSIT_OVERLAY activate
    
    ! 2. CRITICAL FIX: Remove this command.
    ! If left in, it ignores the manual VNI block below and 
    ! exports "RT:65012:1000" instead of "RT:65000:1002".
    no advertise-all-vni
    
    advertise-svi-ip
    
    ! Manual VNI Block
    vni 1000
      rd 192.168.100.16:1000
      
      ! Correct Spoke Logic:
      ! Import ONLY the Hub (Controller)
      route-target import 65000:1000
      
      ! Export ONLY my own unique Spoke ID
      route-target export 65000:1002
    exit-vni
  exit-address-family
exit