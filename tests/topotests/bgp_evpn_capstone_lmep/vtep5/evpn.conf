!
frr defaults datacenter
!
! debug bgp evpn mh es
! debug bgp evpn mh route
! debug bgp zebra
!
!
router bgp 65005
  bgp router-id 50.50.50.50
  no bgp ebgp-requires-policy

  neighbor TRANSIT_OVERLAY peer-group
  neighbor TRANSIT_OVERLAY remote-as external

  neighbor 10.1.5.1 peer-group TRANSIT_OVERLAY
  neighbor 10.2.5.1 peer-group TRANSIT_OVERLAY

  address-family ipv4 unicast
    neighbor TRANSIT_OVERLAY activate
    redistribute connected
  exit-address-family

  address-family l2vpn evpn
    neighbor TRANSIT_OVERLAY activate
    advertise-all-vni
    advertise-svi-ip
  exit-address-family
!
exit
