frr defaults datacenter
!
router bgp 65010
  bgp router-id 100.100.100.100
  no bgp ebgp-requires-policy

  neighbor TRANSIT_OVERLAY peer-group
  neighbor TRANSIT_OVERLAY remote-as external

  neighbor 10.1.1.2 peer-group TRANSIT_OVERLAY
  neighbor 10.1.2.2 peer-group TRANSIT_OVERLAY
  neighbor 10.1.3.2 peer-group TRANSIT_OVERLAY
  neighbor 10.1.4.2 peer-group TRANSIT_OVERLAY

  redistribute connected
!