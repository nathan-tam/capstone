!
frr defaults datacenter
!
!debug bgp evpn mh es
!debug bgp evpn mh route
!debug bgp zebra
debug bgp updates
!
!
router bgp 65001
  bgp router-id 10.10.10.10
  no bgp ebgp-requires-policy

  neighbor TRANSIT_OVERLAY peer-group
  neighbor TRANSIT_OVERLAY remote-as external

  neighbor 10.1.1.1 peer-group TRANSIT_OVERLAY
  neighbor 10.2.1.1 peer-group TRANSIT_OVERLAY

  address-family ipv4 unicast
    neighbor TRANSIT_OVERLAY activate
    redistribute connected
  exit-address-family

!router bgp 65001 vrf vrf500
!  address-family ipv4 unicast
!  redistribute connected
!  exit-address-family
!  !
!  address-family ipv6 unicast
!  redistribute connected
!  exit-address-family
!
!  address-family l2vpn evpn
!    advertise ipv4 unicast
!    advertise ipv6 unicast
!  exit-address-family
!
exit
