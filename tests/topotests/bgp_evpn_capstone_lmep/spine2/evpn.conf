frr defaults datacenter
!
router bgp 65020
  bgp router-id 200.200.200.200
  no bgp ebgp-requires-policy

  neighbor TRANSIT_OVERLAY peer-group
  neighbor TRANSIT_OVERLAY remote-as external

  neighbor 10.2.1.2 peer-group TRANSIT_OVERLAY
  neighbor 10.2.2.2 peer-group TRANSIT_OVERLAY
  neighbor 10.2.3.2 peer-group TRANSIT_OVERLAY
  neighbor 10.2.4.2 peer-group TRANSIT_OVERLAY
  neighbor 10.2.5.2 peer-group TRANSIT_OVERLAY
  neighbor 10.2.6.2 peer-group TRANSIT_OVERLAY
  neighbor 10.2.7.2 peer-group TRANSIT_OVERLAY

  redistribute connected
  address-family l2vpn evpn
    neighbor TRANSIT_OVERLAY activate
  exit-address-family
!
